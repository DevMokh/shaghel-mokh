<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم — شغل مخك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase Compat — no type=module needed -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#050508;
            --bg2:#0d0d12;
            --card:#12121a;
            --card2:#1a1a24;
            --border:rgba(255,255,255,0.07);
            --accent:#f97316;
            --accent2:#ea580c;
            --gold:#fbbf24;
            --text:#fff;
            --text2:rgba(255,255,255,0.45);
            --green:#22c55e;
            --red:#ef4444;
            --blue:#38bdf8;
        }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; direction:rtl; }

        /* LOGIN */
        #login-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-card { background:var(--card); border:1px solid var(--border); border-radius:28px; padding:48px 40px; width:90%; max-width:380px; text-align:center; box-shadow:0 30px 80px rgba(0,0,0,.7); }
        .login-logo  { font-size:50px; margin-bottom:16px; }
        .login-title { font-size:22px; font-weight:900; margin-bottom:6px; }
        .login-sub   { font-size:13px; color:var(--text2); margin-bottom:30px; }
        .pass-input  { width:100%; background:#0f0f0f; border:1px solid var(--border); border-radius:16px; padding:16px 18px; color:#fff; font-family:'Tajawal',sans-serif; font-size:16px; font-weight:700; outline:none; text-align:center; letter-spacing:.1em; margin-bottom:16px; transition:border-color .2s; }
        .pass-input:focus { border-color:#f97316; box-shadow:0 0 0 3px rgba(249,115,22,.1); }
        .login-btn   { width:100%; background:linear-gradient(135deg,#f97316,#ea580c); color:#fff; border:none; border-radius:16px; padding:16px; font-family:'Tajawal',sans-serif; font-size:17px; font-weight:900; cursor:pointer; transition:.2s; }
        .login-btn:active { transform:scale(.97); }
        .pass-error  { color:#ef4444; font-size:13px; font-weight:700; margin-top:12px; display:none; }

        /* LOADING */
        #loading-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:5000; backdrop-filter:blur(4px); }
        #loading-overlay.active { display:flex; }
        .loader { width:46px; height:46px; border:3px solid rgba(251,191,36,.2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* MAIN */
        #main-content { display:none; min-height:100vh; }
        .topbar { background:rgba(5,5,8,.95); border-bottom:1px solid rgba(249,115,22,.1); padding:0 28px; height:66px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; backdrop-filter:blur(20px); }
        .topbar-brand { display:flex; align-items:center; gap:12px; }
        .topbar-logo  { font-size:26px; }
        .topbar-title { font-size:18px; font-weight:900; }
        .topbar-badge { background:rgba(249,115,22,.12); color:#f97316; border:1px solid rgba(249,115,22,.2); font-size:11px; font-weight:900; padding:4px 12px; border-radius:20px; letter-spacing:.05em; }
        .topbar-actions { display:flex; gap:10px; }

        .btn-primary   { background:linear-gradient(135deg,#f97316,#ea580c); color:#fff; border:none; border-radius:14px; padding:10px 20px; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:900; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:6px; }
        .btn-primary:active { transform:scale(.96); }
        .btn-secondary { background:#1e1e1e; color:#fff; border:1px solid var(--border); border-radius:14px; padding:10px 18px; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:6px; }
        .btn-secondary:active { transform:scale(.96); background:#252525; }
        .btn-danger    { background:rgba(239,68,68,.1); color:#f87171; border:1px solid rgba(239,68,68,.2); border-radius:14px; padding:10px 18px; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:.2s; }
        .btn-danger:active { transform:scale(.96); }

        .page-content { padding:28px; max-width:1400px; margin:0 auto; }

        /* STATS */
        .stats-row { display:flex; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
        .stat-big-card { border:1px solid rgba(249,115,22,.1); position:relative; overflow:hidden; background:var(--card); border:1px solid var(--border); border-radius:22px; padding:22px 28px; flex:1; min-width:160px; }
        .stat-big-label { font-size:11px; font-weight:900; color:var(--text2); text-transform:uppercase; letter-spacing:.1em; margin-bottom:8px; }
        .stat-big-value { color:#f97316; font-size:36px; font-weight:900; color:var(--accent); }

        .cat-stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:28px; }
        .stat-cat-card  { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:16px 14px; text-align:center; cursor:pointer; transition:.2s; }
        .stat-cat-card:hover  { border-color:rgba(251,191,36,.3); background:#1c1c1c; }
        .stat-cat-card:active { transform:scale(.97); }
        .stat-cat-icon  { font-size:26px; display:block; margin-bottom:8px; }
        .stat-cat-name  { font-size:12px; font-weight:700; color:var(--text2); display:block; margin-bottom:6px; }
        .stat-cat-count { font-size:22px; font-weight:900; color:var(--accent); display:block; }

        /* FILTERS */
        .filters-bar { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .filter-select { background:#0f0f0f; border:1px solid var(--border); border-radius:12px; padding:10px 14px; color:#fff; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; outline:none; cursor:pointer; min-width:160px; }
        .filter-select:focus { border-color:var(--accent); }
        .search-input  { background:#0f0f0f; border:1px solid var(--border); border-radius:12px; padding:10px 16px; color:#fff; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; outline:none; flex:1; min-width:180px; }
        .search-input:focus { border-color:var(--accent); }
        .search-input::placeholder { color:var(--text2); }
        .filter-result { font-size:13px; font-weight:900; color:var(--accent); white-space:nowrap; }

        /* TABLE */
        .table-wrapper { background:var(--card); border:1px solid var(--border); border-radius:22px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        thead tr { background:#111; border-bottom:1px solid var(--border); }
        th { padding:14px 16px; font-size:12px; font-weight:900; color:var(--text2); text-transform:uppercase; letter-spacing:.07em; white-space:nowrap; text-align:right; }
        tbody tr { border-bottom:1px solid rgba(255,255,255,.03); transition:background .15s; }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:rgba(255,255,255,.02); }
        td { padding:14px 16px; font-size:14px; vertical-align:middle; text-align:right; }
        .td-num { color:var(--text2); font-size:12px; font-weight:900; width:40px; }
        .td-q   { max-width:300px; font-weight:700; line-height:1.4; }
        .td-sub { color:var(--text2); font-size:13px; }
        .td-ans { color:#22c55e; font-size:13px; font-weight:700; max-width:160px; }
        .td-actions { white-space:nowrap; }
        .cat-badge { display:inline-flex; align-items:center; gap:4px; background:rgba(251,191,36,.08); color:var(--accent); font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; }
        .btn-action { border:none; border-radius:10px; padding:7px 12px; font-family:'Tajawal',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:.15s; margin-right:6px; }
        .btn-edit   { background:rgba(96,165,250,.12); color:#60a5fa; }
        .btn-edit:active   { background:rgba(96,165,250,.22); transform:scale(.95); }
        .btn-delete { background:rgba(239,68,68,.1);  color:#f87171; }
        .btn-delete:active { background:rgba(239,68,68,.2); transform:scale(.95); }

        /* PAGINATION */
        #pagination { display:flex; gap:6px; justify-content:center; padding:20px; flex-wrap:wrap; }
        .pg-btn { background:#1a1a1a; border:1px solid var(--border); color:var(--text2); border-radius:10px; width:38px; height:38px; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:.15s; }
        .pg-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
        .pg-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
        .pg-btn:disabled { opacity:.3; cursor:not-allowed; }

        /* SECTION HEAD */
        .section-head  { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .section-title { font-size:16px; font-weight:900; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }

        /* MODALS */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(12px); z-index:2000; display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-overlay.active { display:flex; }
        .modal-box     { background:#161616; border:1px solid var(--border); border-radius:28px; width:100%; box-shadow:0 30px 80px rgba(0,0,0,.8); overflow:hidden; max-height:90vh; display:flex; flex-direction:column; }
        .modal-box.md  { max-width:560px; }
        .modal-box.lg  { max-width:820px; }
        .modal-topbar  { display:flex; justify-content:space-between; align-items:center; padding:22px 24px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .modal-box-title { font-size:18px; font-weight:900; }
        .modal-x { background:#252525; border:1px solid var(--border); border-radius:12px; width:38px; height:38px; color:var(--text2); font-size:15px; cursor:pointer; font-family:'Tajawal',sans-serif; transition:.2s; }
        .modal-x:active { transform:scale(.9); }
        .modal-scroll  { overflow-y:auto; flex:1; padding:24px; }

        /* FORM */
        .form-group  { margin-bottom:18px; }
        .form-label  { display:block; font-size:12px; font-weight:900; color:var(--text2); text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px; }
        .form-input, .form-select, .form-textarea { width:100%; background:#0f0f0f; border:1px solid var(--border); border-radius:14px; padding:13px 16px; color:#fff; font-family:'Tajawal',sans-serif; font-size:15px; font-weight:700; outline:none; transition:border-color .2s; }
        .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent); }
        .form-textarea { resize:vertical; min-height:80px; }
        .form-select   { cursor:pointer; }
        .options-grid  { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .option-item   { display:flex; align-items:center; gap:10px; }
        .option-label  { font-size:18px; width:28px; flex-shrink:0; font-weight:900; }
        .opt-a{color:#60a5fa;} .opt-b{color:#34d399;} .opt-c{color:#f472b6;} .opt-d{color:#fb923c;}
        .correct-select { background:rgba(34,197,94,.08); border-color:rgba(34,197,94,.25); color:#22c55e; }
        .form-footer   { display:flex; gap:12px; justify-content:flex-end; padding:20px 24px; border-top:1px solid var(--border); flex-shrink:0; }

        /* AI */
        .ai-config   { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
        .ai-q-card   { background:#1e1e1e; border:1px solid var(--border); border-radius:16px; padding:16px 14px; margin-bottom:10px; display:flex; gap:12px; align-items:flex-start; }
        .ai-q-num    { width:28px; height:28px; background:rgba(251,191,36,.1); color:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; flex-shrink:0; margin-top:2px; }
        .ai-q-body   { flex:1; }
        .ai-q-text   { font-size:14px; font-weight:700; margin-bottom:10px; line-height:1.5; }
        .ai-q-opts   { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
        .ai-opt      { font-size:12px; font-weight:700; padding:6px 10px; background:rgba(255,255,255,.04); border-radius:8px; color:var(--text2); }
        .ai-opt.correct { background:rgba(34,197,94,.12); color:#22c55e; }
        .ai-q-explain  { font-size:12px; color:var(--text2); font-style:italic; }
        .ai-q-remove   { background:none; border:none; color:rgba(255,255,255,.2); font-size:16px; cursor:pointer; padding:4px; flex-shrink:0; transition:.15s; }
        .ai-q-remove:hover { color:#f87171; }
        .ai-save-wrap  { position:sticky; bottom:0; background:#161616; padding:16px 0 0; border-top:1px solid var(--border); margin-top:8px; }

        /* CONFIRM */
        .confirm-box { background:#161616; border:1px solid rgba(239,68,68,.3); border-radius:24px; padding:36px; max-width:420px; width:100%; text-align:center; box-shadow:0 20px 60px rgba(239,68,68,.15); }
        .confirm-icon { font-size:44px; margin-bottom:16px; }
        .confirm-msg-text { font-size:16px; font-weight:700; margin-bottom:28px; line-height:1.6; white-space:pre-wrap; }
        .confirm-btns { display:flex; gap:12px; justify-content:center; }
        .confirm-yes-btn { background:#ef4444; color:#fff; border:none; border-radius:14px; padding:13px 30px; font-family:'Tajawal',sans-serif; font-size:15px; font-weight:900; cursor:pointer; transition:.2s; }
        .confirm-yes-btn:active { transform:scale(.96); }
        .confirm-no-btn  { background:#1e1e1e; color:var(--text2); border:1px solid var(--border); border-radius:14px; padding:13px 30px; font-family:'Tajawal',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:.2s; }
        .confirm-no-btn:active { transform:scale(.96); }

        /* TOAST */
        #toast-container { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
        .toast { background:#1e1e1e; border:1px solid var(--border); border-right-width:3px; color:#fff; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; padding:14px 20px; border-radius:16px; min-width:220px; max-width:340px; box-shadow:0 8px 30px rgba(0,0,0,.5); animation:toastSlide .3s cubic-bezier(.34,1.56,.64,1) forwards; transition:opacity .3s; }
        @keyframes toastSlide { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }

        ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(251,191,36,.3);border-radius:10px}

        @media(max-width:700px){
            .page-content{padding:14px} .topbar{padding:0 14px}
            .ai-config,.options-grid{grid-template-columns:1fr}
            .topbar-actions .btn-secondary span:last-child{display:none}
        }

        /* ── GAMING THEME ADDITIONS ── */
        body { background:var(--bg); }

        /* Stars bg */
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 0%, rgba(249,115,22,.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 80% 100%, rgba(56,189,248,.04) 0%, transparent 60%);
        }
        .page-content { position:relative; z-index:1; }

        /* Better cards */
        .stat-big-card {
            background:linear-gradient(135deg,rgba(249,115,22,.08),rgba(234,88,12,.04));
        }
        .stat-big-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:2px;
            background:linear-gradient(90deg,transparent,rgba(249,115,22,.5),transparent);
        }

        /* Better table */
        .questions-table th { background:rgba(249,115,22,.08); color:#f97316; font-weight:900; }
        .questions-table tr:hover td { background:rgba(249,115,22,.04); }

        /* Better modal */
        .modal-box {
            border-top:2px solid rgba(249,115,22,.3);
            box-shadow:0 -10px 60px rgba(249,115,22,.08);
        }

        /* Better filters */
        .filter-select, .search-input {
            background:var(--card2);
            border:1px solid rgba(249,115,22,.1);
            border-radius:12px;
        }
        .filter-select:focus, .search-input:focus {
            border-color:#f97316;
            outline:none;
            box-shadow:0 0 0 3px rgba(249,115,22,.1);
        }

        /* Section head */
        .section-head { border-bottom:1px solid rgba(249,115,22,.1); }
        .section-title { color:#fff; font-weight:900; font-size:16px; }
        .section-title::before {
            content:''; display:inline-block; width:3px; height:16px;
            background:#f97316; border-radius:2px; margin-left:8px; vertical-align:middle;
        }

        /* Category cards */
        .cat-card { border-radius:16px; padding:16px; transition:.2s; }
        .cat-card:hover { border-color:rgba(249,115,22,.2); transform:translateY(-2px); }
        .cat-name { font-weight:900; font-size:14px; }
        .cat-count { font-size:24px; font-weight:900; color:#f97316; }

        /* AI panel */
        .ai-panel { background:linear-gradient(135deg,rgba(249,115,22,.06),rgba(56,189,248,.04)); }

        /* Pagination */
        .page-btn.active { background:#f97316; color:#fff; border-color:#f97316; }
        .page-btn { border-radius:10px; border:1px solid var(--border); }

        /* Badges */
        .badge-easy   { background:rgba(34,197,94,.15);  color:#22c55e;  border-radius:8px; padding:2px 8px; font-size:11px; font-weight:900; }
        .badge-medium { background:rgba(249,115,22,.15); color:#f97316;  border-radius:8px; padding:2px 8px; font-size:11px; font-weight:900; }
        .badge-hard   { background:rgba(239,68,68,.15);  color:#ef4444;  border-radius:8px; padding:2px 8px; font-size:11px; font-weight:900; }

        /* Action buttons in table */
        .action-btn { border-radius:8px; padding:5px 10px; font-size:12px; border:none; cursor:pointer; transition:.18s; }
        .action-btn.edit   { background:rgba(56,189,248,.12); color:#38bdf8; }
        .action-btn.delete { background:rgba(239,68,68,.12);  color:#ef4444; }
        .action-btn:active { transform:scale(.92); }

    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-brain" style="color:var(--accent);font-size:44px"></i></div>
        <h1 class="login-title">لوحة تحكم المسؤول</h1>
        <p class="login-sub">شغل مخك — Ultra Edition</p>
        <input type="password" id="pass-input" class="pass-input" placeholder="كلمة المرور"
               onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="login-btn" onclick="checkPassword()">دخول</button>
        <p class="pass-error" id="pass-error">❌ كلمة المرور غير صحيحة</p>
    </div>
</div>

<!-- MAIN -->
<div id="main-content">
    <div class="topbar">
        <div class="topbar-brand">
            <span class="topbar-logo"><i class="fas fa-brain" style="color:var(--accent)"></i></span>
            <span class="topbar-title">لوحة التحكم</span>
            <span class="topbar-badge">Admin v4.0</span>
        </div>
        <div class="topbar-actions">
            <button class="btn-secondary" onclick="openAIPanel()"><i class="fas fa-wand-magic-sparkles"></i><span>توليد AI</span></button>
            <button class="btn-primary"   onclick="openAddForm()"><i class="fas fa-plus"></i><span>إضافة سؤال</span></button>
        </div>
    </div>

    <div class="page-content">
        <div class="stats-row">
            <div class="stat-big-card">
                <div class="stat-big-label">إجمالي الأسئلة</div>
                <div class="stat-big-value" id="stat-total">—</div>
            </div>
            <div class="stat-big-card">
                <div class="stat-big-label">الظاهرين حالياً</div>
                <div class="stat-big-value" id="stat-filtered">—</div>
            </div>
        </div>

        <div class="section-head"><span class="section-title">الأسئلة حسب التصنيف</span></div>
        <div id="cat-stats-grid" class="cat-stats-grid"></div>

        <div id="questions-section">
            <div class="section-head">
                <span class="section-title">جميع الأسئلة</span>
                <span id="filter-result-count" class="filter-result"></span>
            </div>
            <div class="filters-bar">
                <select id="filter-cat" class="filter-select" onchange="onFilterCatChange()">
                    <option value="all">كل التصنيفات</option>
                </select>
                <select id="filter-sub" class="filter-select" onchange="onFilterSubChange()">
                    <option value="all">كل الأقسام</option>
                </select>
                <input id="search-input" class="search-input" placeholder="ابحث في الأسئلة..." oninput="onSearch(this.value)">
                <button class="btn-danger" onclick="deleteByCat()">🗑️ حذف الظاهرين</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th><th>السؤال</th><th>التصنيف</th>
                            <th>القسم</th><th>الإجابة الصحيحة</th><th>إجراءات</th>
                        </tr>
                    </thead>

// ─── FIREBASE INIT ───────────────────────────────────────────
var firebaseConfig = {

    authDomain:        "shaghel-mokh-ultra.firebaseapp.com",
    projectId:         "shaghel-mokh-ultra",
    storageBucket:     "shaghel-mokh-ultra.firebasestorage.app",
    messagingSenderId: "167435076773",

    measurementId:     "G-EPJ1MGWBQW"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// ─── CONSTANTS ────────────────────────────────────────────────
// ✅ تم تغيير const إلى var لتجنب خطأ TDZ (Cannot access before initialization)
var APP_ID     = 'shaghel-mokh-ultra-full';
var GEMINI_KEY = '';        // أو ضع مفتاحك هنا مباشرة
var ADMIN_PASS = 'admin2025';
var PAGE_SIZE  = 15;

var categoryConfig = {
    islamic: { name:"إسلاميات",  icon:"🕌", subs:["قصص الأنبياء","القرآن الكريم","السيرة النبوية","الفقه الميسر"] },
    egypt:   { name:"تاريخ مصر", icon:"🏺", subs:["الفراعنة","مصر الحديثة","آثار النوبة","ثورات مصر"] },

    science: { name:"علوم وفضاء", icon:"🚀", subs:["الفضاء","جسم الإنسان","الكيمياء","الفيزياء الكمية"] },
    geo:     { name:"جغرافيا",    icon:"🌍", subs:["عواصم","أعلام","عجائب الدنيا","تضاريس الأرض"] },
    sports:  { name:"رياضة",      icon:"⚽", subs:["كرة قدم","أساطير","الأولمبياد","كأس العالم"] },
    puzzles: { name:"ألغاز",      icon:"🧩", subs:["منطق","أحجيات","رياضيات","ذكاء بصري"] },
    food:    { name:"طعام",       icon:"🍱", subs:["أطباق عالمية","حلويات","توابل","فواكه نادرة"] }
};

// ─── STATE ────────────────────────────────────────────────────
var allQuestions      = [];
var filteredQuestions = [];
var currentPage       = 1;
var editingDocId      = null;
var activeFilterCat   = 'all';
var activeFilterSub   = 'all';
var searchTerm        = '';
var pendingAIQuestions = [];
var pendingAIMeta      = {};
var searchTimeout;

// ─── HELPERS ─────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }

function showToast(msg, type) {
    type = type || 'success';
    var colors = {success:'#22c55e', error:'#ef4444', info:'#fbbf24', loading:'#60a5fa'};
    var t = document.createElement('div');
    t.className = 'toast';
    t.style.borderColor = colors[type] || colors.info;
    t.innerHTML = msg;
    $('toast-container').appendChild(t);
    if (type !== 'loading') {
        setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.remove(); }, 350); }, 3000);
    }
    return t;
}

function showConfirm(msg, onYes) {
    $('confirm-msg').innerText = msg;
    $('confirm-modal').classList.add('active');
    $('confirm-yes-btn').onclick = function(){ $('confirm-modal').classList.remove('active'); onYes(); };
}

function closeConfirm(){ $('confirm-modal').classList.remove('active'); }

function getCatIcon(catName) {
    var found = Object.values(categoryConfig).find(function(c){ return c.name === catName; });
    return found ? found.icon : '❓';
}

function setLoading(on){ $('loading-overlay').classList.toggle('active', on); }

// ─── PASSWORD ────────────────────────────────────────────────
function checkPassword() {
    var val = $('pass-input').value;
    if (val === ADMIN_PASS) {
        sessionStorage.setItem('admin_auth','yes');
        $('login-screen').style.display = 'none';
        $('main-content').style.display = '';
        initApp();
    } else {
        $('pass-error').style.display = '';
        $('pass-input').value = '';
        setTimeout(function(){ $('pass-error').style.display = 'none'; }, 2000);
    }
}

// ─── LOAD ────────────────────────────────────────────────────
function getCol(){
    return db.collection('artifacts').doc(APP_ID)
             .collection('public').doc('data').collection('questions');
}

function loadQuestions() {
    setLoading(true);
    return getCol().get().then(function(snap){
        allQuestions = [];
        snap.forEach(function(d){ allQuestions.push(Object.assign({id:d.id}, d.data())); });
        allQuestions.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
        renderStats();
        applyFilters();
    }).catch(function(e){
        showToast('❌ خطأ Firebase: '+e.message, 'error');
    }).finally(function(){
        setLoading(false);
    });
}

// ─── STATS ───────────────────────────────────────────────────
function renderStats() {
    $('stat-total').innerText = allQuestions.length;
    var grid = $('cat-stats-grid');
    grid.innerHTML = '';
    Object.keys(categoryConfig).forEach(function(key){
        var cat   = categoryConfig[key];
        var count = allQuestions.filter(function(q){ return q.category === cat.name; }).length;
        var card  = document.createElement('div');
        card.className = 'stat-cat-card';
        card.innerHTML = '<span class="stat-cat-icon">'+cat.icon+'</span>'
                       + '<span class="stat-cat-name">'+cat.name+'</span>'
                       + '<span class="stat-cat-count">'+count+'</span>';
        card.onclick = function(){
            activeFilterCat = key; activeFilterSub = 'all'; applyFilters();
            $('questions-section').scrollIntoView({behavior:'smooth'});
        };
        grid.appendChild(card);
    });
}

// ─── FILTERS ─────────────────────────────────────────────────
function buildCatFilter() {
    var sel = $('filter-cat');
    sel.innerHTML = '<option value="all">كل التصنيفات</option>';
    Object.keys(categoryConfig).forEach(function(key){
        sel.innerHTML += '<option value="'+key+'">'+categoryConfig[key].icon+' '+categoryConfig[key].name+'</option>';
    });
}

function buildSubFilter(catKey) {
    var sel = $('filter-sub');
    sel.innerHTML = '<option value="all">كل الأقسام</option>';
    if (catKey === 'all') return;
    categoryConfig[catKey].subs.forEach(function(sub){
        sel.innerHTML += '<option value="'+sub+'">'+sub+'</option>';
    });
}

function onFilterCatChange(){ activeFilterCat=$('filter-cat').value; activeFilterSub='all'; applyFilters(); }
function onFilterSubChange(){ activeFilterSub=$('filter-sub').value; applyFilters(); }

function onSearch(val){
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(function(){ searchTerm=val.trim(); applyFilters(); }, 280);
}

function applyFilters() {
    $('filter-cat').value = activeFilterCat;
    buildSubFilter(activeFilterCat);
    $('filter-sub').value = activeFilterSub;

    filteredQuestions = allQuestions.filter(function(q){
        var catMatch  = activeFilterCat==='all' || q.category===(categoryConfig[activeFilterCat]||{}).name;
        var subMatch  = activeFilterSub==='all' || q.subCategory===activeFilterSub;
        var srchMatch = !searchTerm || (q.t||'').includes(searchTerm) || (q.category||'').includes(searchTerm) || (q.subCategory||'').includes(searchTerm);
        return catMatch && subMatch && srchMatch;
    });

    currentPage = 1;
    $('filter-result-count').innerText = filteredQuestions.length + ' سؤال';
    $('stat-filtered').innerText = filteredQuestions.length;
    renderTable();
    renderPagination();
}

// ─── TABLE ───────────────────────────────────────────────────
function renderTable() {
    var tbody = $('questions-tbody');
    tbody.innerHTML = '';
    var start = (currentPage-1)*PAGE_SIZE;
    var slice = filteredQuestions.slice(start, start+PAGE_SIZE);

    if (!slice.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:50px;opacity:.4;font-size:15px">لا توجد أسئلة</td></tr>';
        return;
    }
    slice.forEach(function(q, i){
        var safeT = (q.t||'').replace(/'/g,"&#39;").replace(/"/g,"&quot;").slice(0,55);
        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td class="td-num">'+(start+i+1)+'</td>'
           +'<td class="td-q">'+(q.t||'—')+'</td>'
           +'<td class="td-cat"><span class="cat-badge">'+getCatIcon(q.category)+' '+(q.category||'—')+'</span></td>'
           +'<td class="td-sub">'+(q.subCategory||'—')+'</td>'
           +'<td class="td-ans">'+((q.a&&q.a[q.c])||'—')+'</td>'
           +'<td class="td-actions">'
               +'<button class="btn-action btn-edit"   onclick="openEdit(\''+q.id+'\')">✏️ تعديل</button>'
               +'<button class="btn-action btn-delete" onclick="deleteQuestion(\''+q.id+'\',\''+safeT+'\')">🗑️ حذف</button>'
           +'</td>';
        tbody.appendChild(tr);
    });
}

function renderPagination() {
    var total = Math.ceil(filteredQuestions.length / PAGE_SIZE);
    var pg = $('pagination');
    pg.innerHTML = '';
    if (total <= 1) return;

    function mkBtn(label, page, disabled, active) {
        var b = document.createElement('button');
        b.className = 'pg-btn'+(active?' active':'');
        b.innerText = label; b.disabled = !!disabled;
        b.onclick = function(){ currentPage=page; renderTable(); renderPagination(); };
        pg.appendChild(b);
    }

    mkBtn('‹', currentPage-1, currentPage===1, false);
    for (var i=1; i<=total; i++) {
        if (total>7 && i>2 && i<total-1 && Math.abs(i-currentPage)>2) {
            if (i===3||i===total-2){ var sp=document.createElement('span'); sp.innerText='…'; sp.style.cssText='padding:0 6px;color:rgba(255,255,255,.3)'; pg.appendChild(sp); }
            continue;
        }
        mkBtn(i, i, false, i===currentPage);
    }
    mkBtn('›', currentPage+1, currentPage===total, false);
}

// ─── ADD / EDIT ───────────────────────────────────────────────
function buildFormSelects() {
    var sel = $('form-cat');
    sel.innerHTML = '<option value="">اختر التصنيف</option>';
    Object.keys(categoryConfig).forEach(function(key){
        sel.innerHTML += '<option value="'+key+'">'+categoryConfig[key].icon+' '+categoryConfig[key].name+'</option>';
    });
}

function onFormCatChange() {
    var key = $('form-cat').value;
    var sub = $('form-sub');
    sub.innerHTML = '<option value="">اختر القسم الفرعي</option>';
    if (!key) return;
    categoryConfig[key].subs.forEach(function(s){ sub.innerHTML += '<option value="'+s+'">'+s+'</option>'; });
}

function openAddForm() {
    editingDocId = null;
    $('form-title').innerText = '➕ إضافة سؤال جديد';
    ['form-q','form-a0','form-a1','form-a2','form-a3','form-explain'].forEach(function(id){ $(id).value=''; });
    $('form-correct').value = '0';
    $('form-cat').value = '';
    $('form-sub').innerHTML = '<option value="">اختر القسم الفرعي</option>';
    $('question-modal').classList.add('active');
}

function openEdit(docId) {
    var q = allQuestions.find(function(x){ return x.id===docId; });
    if (!q) return;
    editingDocId = docId;
    $('form-title').innerText  = '✏️ تعديل السؤال';
    $('form-q').value          = q.t||'';
    $('form-a0').value         = (q.a&&q.a[0])||'';
    $('form-a1').value         = (q.a&&q.a[1])||'';
    $('form-a2').value         = (q.a&&q.a[2])||'';
    $('form-a3').value         = (q.a&&q.a[3])||'';
    $('form-correct').value    = String(q.c||0);
    $('form-explain').value    = q.x||'';
    var catKey = Object.keys(categoryConfig).find(function(k){ return categoryConfig[k].name===q.category; });
    $('form-cat').value = catKey||'';
    onFormCatChange();
    $('form-sub').value = q.subCategory||'';
    $('question-modal').classList.add('active');
}

function closeQuestionModal(){ $('question-modal').classList.remove('active'); }

function saveQuestion() {
    var t      = $('form-q').value.trim();
    var a      = [$('form-a0').value.trim(),$('form-a1').value.trim(),$('form-a2').value.trim(),$('form-a3').value.trim()];
    var c      = parseInt($('form-correct').value);
    var x      = $('form-explain').value.trim();
    var catKey = $('form-cat').value;
    var sub    = $('form-sub').value;

    if (!t || a.some(function(v){return !v;}) || !catKey || !sub) {
        showToast('❌ أكمل جميع الحقول', 'error'); return;
    }

    var data = {t:t, a:a, c:c, x:x, category:categoryConfig[catKey].name, subCategory:sub, createdAt:Date.now()};
    var toast = showToast('⏳ جاري الحفظ...', 'loading');

    var promise = editingDocId ? getCol().doc(editingDocId).update(data) : getCol().add(data);
    promise.then(function(){
        toast.remove();
        showToast(editingDocId ? '✅ تم التعديل' : '✅ تمت الإضافة');
        closeQuestionModal();
        loadQuestions();
    }).catch(function(e){
        toast.remove(); showToast('❌ خطأ: '+e.message, 'error');
    });
}

// ─── DELETE ───────────────────────────────────────────────────
function deleteQuestion(docId, text) {
    showConfirm('حذف السؤال:\n"'+text+'..."', function(){
        var toast = showToast('⏳ جاري الحذف...','loading');
        getCol().doc(docId).delete().then(function(){
            toast.remove(); showToast('🗑️ تم الحذف');
            loadQuestions();
        }).catch(function(e){
            toast.remove(); showToast('❌ خطأ: '+e.message,'error');
        });
    });
}

function deleteByCat() {
    if (!filteredQuestions.length){ showToast('لا توجد أسئلة','info'); return; }
    var catName = activeFilterCat==='all' ? 'كل التصنيفات' : (categoryConfig[activeFilterCat]||{}).name;
    var subName = activeFilterSub==='all' ? '' : ' - '+activeFilterSub;
    showConfirm('حذف '+filteredQuestions.length+' سؤال من:\n"'+catName+subName+'" ؟\nهذا الإجراء لا يمكن التراجع عنه!', function(){
        var toast = showToast('⏳ حذف '+filteredQuestions.length+' سؤال...','loading');
        var batch = db.batch();
        filteredQuestions.forEach(function(q){ batch.delete(getCol().doc(q.id)); });
        batch.commit().then(function(){
            toast.remove(); showToast('🗑️ تم حذف '+filteredQuestions.length+' سؤال');
            loadQuestions();
        }).catch(function(e){
            toast.remove(); showToast('❌ خطأ: '+e.message,'error');
        });
    });
}

function buildAISelects() {
    var sel = $('ai-cat');
    sel.innerHTML = '';
    Object.keys(categoryConfig).forEach(function(key){
        sel.innerHTML += '<option value="'+key+'">'+categoryConfig[key].icon+' '+categoryConfig[key].name+'</option>';
    });
    onAICatChange();
}

function onAICatChange() {
    var key = $('ai-cat').value;
    var sub = $('ai-sub');
    sub.innerHTML = '';
    if (!key) return;
    categoryConfig[key].subs.forEach(function(s){ sub.innerHTML += '<option value="'+s+'">'+s+'</option>'; });
}

function openAIPanel(){ $('ai-modal').classList.add('active'); }
function closeAIModal(){ $('ai-modal').classList.remove('active'); }

function generateAI() {
    var catKey = $('ai-cat').value;
    var sub    = $('ai-sub').value;
    var count  = parseInt($('ai-count').value)||10;
    var diff   = $('ai-difficulty').value;
    var apiKey = $('ai-apikey').value.trim() || GEMINI_KEY;

    if (!apiKey){ showToast('❌ أدخل Gemini API Key','error'); return; }
    if (!catKey||!sub){ showToast('❌ اختر التصنيف والقسم','error'); return; }

    var catName = categoryConfig[catKey].name;
    var btn = $('ai-gen-btn');
    btn.disabled=true; btn.innerText='⏳ جاري التوليد...';
    $('ai-preview').innerHTML='';
    $('ai-save-wrap').style.display='none';

    var prompt = 'أنشئ '+count+' سؤال اختيار من متعدد باللغة العربية عن "'+catName+' - '+sub+'".\n'
               + 'مستوى الصعوبة: '+diff+'.\n'
               + 'ردك يجب أن يكون مصفوفة JSON فقط بدون أي نص إضافي أو backticks.\n'
               + 'الهيكل: [{"t":"السؤال","a":["خيار1","خيار2","خيار3","خيار4"],"c":0,"x":"شرح مختصر"}]\n'
               + 'c هو رقم الخيار الصحيح (0-3). اجعل الأسئلة متنوعة ودقيقة.';

    var toast
